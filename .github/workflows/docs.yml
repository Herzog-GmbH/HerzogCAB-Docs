name: Build and Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'homepage/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Schritt 1: Landing-Page (homepage/) als Root des Sites kopieren.
      # Das gibt uns cab.herzog-online.com/ -> Produkt-Uebersichtsseite.
      - name: Stage homepage as site root
        run: |
          mkdir -p _site
          if [ -d homepage ]; then
            cp -r homepage/. _site/
          else
            echo "Hinweis: homepage/ fehlt - es wird nur das Handbuch gebaut."
          fi

      # Schritt 2: mkdocs in _site/handbuch/ bauen.
      # Das gibt uns cab.herzog-online.com/handbuch/ -> Online-Handbuch.
      - name: Build documentation
        run: mkdocs build --strict --site-dir ./_site/handbuch

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
