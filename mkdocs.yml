          - Migration aus älteren Versionen: workspace/migration.md
      - Einstellungen:
          - settings/index.md
          - Sprache und Schriftgröße: settings/language-font.md
          - Webserver und QR-Code: settings/web-server.md
          - Speicherorte: settings/file-locations.md

  # ----- TAB: Hilfe --------------------------------------------------------
  - Hilfe:
      - Hilfe und FAQ:
          - help/index.md
          - Lizenzprobleme: help/license-problems.md
          - Login-Probleme: help/login-problems.md
          - Druckprobleme: help/print-problems.md
          - Update-Fehler: help/update-errors.md
          - Bekannte Einschränkungen: help/limitations.md
          - Support kontaktieren: help/support.md
      - Anhang:
          - appendix/index.md
          - Tastenkürzel: appendix/keyboard-shortcuts.md
          - Dateispeicherorte: appendix/file-locations.md
          - Glossar: appendix/glossary.md
          - Versionshinweise: appendix/changelog.md
