# =============================================================================
# Herzog CAB - User Manual
# MkDocs Configuration
# =============================================================================
#
# Local preview: mkdocs serve     (http://127.0.0.1:8000)
# Static build:  mkdocs build     -> output in ./site/
# Deploy GH:     Automatically pushed to gh-pages by GitHub Actions.
# =============================================================================

site_name: Herzog CAB - User Manual
site_description: User manual for Herzog CAB - the calculation and design software for braiding machines.
site_author: Herzog GmbH
site_url: https://herzog-gmbh.github.io/HerzogCAB-Docs/

# -----------------------------------------------------------------------------
# Repository (Edit-Buttons in der Doku)
# -----------------------------------------------------------------------------
repo_name: HerzogCAB-Docs
repo_url: https://github.com/herzog-gmbh/HerzogCAB-Docs
edit_uri: edit/main/docs/

# -----------------------------------------------------------------------------
# Copyright im Footer
# -----------------------------------------------------------------------------
copyright: Copyright &copy; Herzog GmbH

# -----------------------------------------------------------------------------
# Material Theme
# -----------------------------------------------------------------------------
theme:
  name: material
  language: en
  logo: assets/logo.png            # noch optional - siehe assets/README.md
  favicon: assets/favicon.png      # noch optional
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  features:
    # navigation.instant ist mit i18n-Sprachschalter nicht kompatibel - deaktiviert
    - navigation.tracking        # Anker in URL
    - navigation.tabs            # Tabs oben fuer Top-Level
    - navigation.tabs.sticky
    - navigation.sections        # Gruppierung in Sidebar
    - navigation.indexes         # index.md als Sektions-Startseite
    - navigation.top             # "Nach oben"-Button
    - navigation.footer          # Vor/Zurueck im Footer
    - search.suggest             # Suchvorschlaege
    - search.highlight           # Treffer hervorheben
    - search.share               # Suchergebnis-Link teilen
    - toc.follow                 # Inhaltsverzeichnis folgt beim Scrollen
    - content.action.edit        # Edit-Button
    - content.code.copy          # Code-Block kopieren
    - content.tabs.link          # Tabs sind verlinkt
  palette:
    # Hell - Herzog-Brand: Primary #00459a, Accent #ffb800
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dunkel
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# -----------------------------------------------------------------------------
# Eigenes CSS (Herzog-Brand: Farben, Schrift, Header, Cards, Tabellen ...)
# -----------------------------------------------------------------------------
extra_css:
  - assets/css/herzog-brand.css

# -----------------------------------------------------------------------------
# Markdown Extensions
# -----------------------------------------------------------------------------
markdown_extensions:
  # Standard
  - abbr
  - admonition                   # !!! note, !!! warning, ...
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true            # anchor links on headings
      title: On this page
  # PyMdown Extensions
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details             # Aufklappbare Bloecke
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys                # ++ctrl+s++ Notation
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - search:
      lang:
        - en
  # - i18n:                      # ENABLE when adding more languages (e.g. de) alongside English
  #     docs_structure: suffix
  #     languages:
  #       - locale: en
  #         default: true
  #         name: English
  #         build: true
  #         site_name: Herzog CAB - User Manual
  #       - locale: de
  #         name: Deutsch
  #         build: true
  #         site_name: Herzog CAB - Handbuch
  # - mike:                      # ENABLE for versioned docs (1.3, 1.4, latest)
  #     version_selector: true
  #     css_dir: css
  #     javascript_dir: js
  #     canonical_version: latest

# -----------------------------------------------------------------------------
# Extra (version selector, social links)
# -----------------------------------------------------------------------------
extra:
  # version:                     # ENABLE once the mike plugin (above) is active
  #   provider: mike
  #   default: latest
  social:
    - icon: fontawesome/solid/globe
      link: https://www.herzog-online.com
      name: Herzog GmbH website
    - icon: fontawesome/solid/envelope
      link: mailto:info@herzog-online.com
      name: Email contact
  generator: false               # hide "Made with MkDocs"

