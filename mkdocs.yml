      - Herzog CAB installieren: installation/installer.md
      - Lizenz aktivieren: installation/activate-license.md
      - Updates:
          - updates/index.md
          - Updates installieren: updates/install.md
          - Versionsverlauf: updates/version-history.md
      - Deinstallation:
          - uninstallation/index.md
          - Über das Maintenance Tool: uninstallation/maintenance-tool.md
          - Über die Windows-Einstellungen: uninstallation/windows-settings.md
          - Daten entfernen: uninstallation/remove-data.md

  # ----- Erste Schritte ----------------------------------------------------
  - Erste Schritte:
      - getting-started/index.md
      - Oberfläche im Überblick: getting-started/interface.md
      - Navigation und Verlauf: getting-started/navigation.md
