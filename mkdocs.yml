# =============================================================================
# Herzog CAB - Anwenderhandbuch
# MkDocs Konfiguration
# =============================================================================
#
# Lokal bauen:    mkdocs serve     (http://127.0.0.1:8000)
# Statisch bauen: mkdocs build     -> Ausgabe in ./site/
# Deploy GH:      Wird automatisch via GitHub Actions auf gh-pages gepusht.
# =============================================================================

site_name: Herzog CAB - Handbuch
site_description: Anwenderhandbuch für Herzog CAB - die Kalkulations- und Designsoftware für Flechtmaschinen.
site_author: Herzog GmbH
# Custom Domain aktiv seit 2026-05-26 (cab.herzog-online.com → GitHub Pages).
site_url: https://cab.herzog-online.com/handbuch/

# -----------------------------------------------------------------------------
# Repository (Edit-Buttons in der Doku)
# -----------------------------------------------------------------------------
repo_name: HerzogCAB-Docs
repo_url: https://github.com/herzog-gmbh/HerzogCAB-Docs
edit_uri: edit/main/docs/

# -----------------------------------------------------------------------------
# Copyright im Footer
# -----------------------------------------------------------------------------
copyright: Copyright &copy; Herzog GmbH

# -----------------------------------------------------------------------------
# Material Theme
# -----------------------------------------------------------------------------
theme:
  name: material
  language: de
  logo: assets/logo.png            # noch optional - siehe assets/README.md
  favicon: assets/favicon.png      # noch optional
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  features:
    # navigation.instant ist mit i18n-Sprachschalter nicht kompatibel - deaktiviert
    - navigation.tracking        # Anker in URL
    - navigation.tabs            # Tabs oben fuer Top-Level
    - navigation.tabs.sticky
    - navigation.sections        # Gruppierung in Sidebar
    - navigation.indexes         # index.md als Sektions-Startseite
    - navigation.top             # "Nach oben"-Button
    - navigation.footer          # Vor/Zurueck im Footer
    - search.suggest             # Suchvorschlaege
    - search.highlight           # Treffer hervorheben
    - search.share               # Suchergebnis-Link teilen
    - toc.follow                 # Inhaltsverzeichnis folgt beim Scrollen
    - content.action.edit        # Edit-Button
    - content.code.copy          # Code-Block kopieren
    - content.tabs.link          # Tabs sind verlinkt
  palette:
    # Hell - Herzog-Brand: Primary #00459a, Accent #ffb800
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Dunkles Design einschalten
    # Dunkel
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Helles Design einschalten

# -----------------------------------------------------------------------------
# Eigenes CSS (Herzog-Brand: Farben, Schrift, Header, Cards, Tabellen ...)
# -----------------------------------------------------------------------------
extra_css:
  - assets/css/herzog-brand.css

# -----------------------------------------------------------------------------
# Markdown Extensions
# -----------------------------------------------------------------------------
markdown_extensions:
  # Standard
  - abbr
  - admonition                   # !!! note, !!! warning, ...
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true            # Anker-Links bei Ueberschriften
      title: Auf dieser Seite
  # PyMdown Extensions
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details             # Aufklappbare Bloecke
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys                # ++ctrl+s++ Notation
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - search:
      lang:
        - de
  # i18n-Plugin und mehrsprachige Konfiguration sind vorerst entfernt.
  # Wir pflegen die Doku zunaechst nur auf Deutsch und uebersetzen erst,
  # wenn der DE-Stand stabil ist. Dann i18n wieder aktivieren und
  # nav_translations/.en.md-Dateien anlegen.
  # - mike:                      # AKTIVIEREN fuer versionierte Doku (1.3, 1.4, latest)
  #     version_selector: true
  #     css_dir: css
  #     javascript_dir: js
  #     canonical_version: latest

# -----------------------------------------------------------------------------
# Extra (Versionsanzeige, Sprachschalter)
# -----------------------------------------------------------------------------
extra:
  # version:                     # AKTIVIEREN, sobald mike-Plugin (oben) eingeschaltet ist
  #   provider: mike
  #   default: latest
  social:
    - icon: fontawesome/solid/globe
      link: https://www.herzog-online.com
      name: Herzog GmbH Website
    - icon: fontawesome/solid/envelope
      link: mailto:info@herzog-online.com
      name: E-Mail Kontakt
  generator: false               # "Made with MkDocs" ausblenden

# -----------------------------------------------------------------------------
# Navigation
# -----------------------------------------------------------------------------
nav:
  - Start: index.md

  # ----- TAB: Einrichten ---------------------------------------------------
  - Einrichten:
      - Installation:
          - installation/index.md
          - Systemvoraussetzungen: installation/system-requirements.md
          - Einsatz-Szenarien: installation/topology.md
          - CodeMeter installieren: installation/codemeter.md
          - Herzog CAB installieren: installation/installer.md
          - Lizenz aktivieren: installation/activate-license.md
      - Erste Schritte:
          - getting-started/index.md
          - Workspace einrichten: getting-started/workspace.md
          - Erstes Admin-Konto: getting-started/admin-account.md
          - Sprache wählen: getting-started/language.md
          - Oberfläche im Überblick: getting-started/interface.md
          - Navigation und Verlauf: getting-started/navigation.md
          - Guided Tour: getting-started/guided-tour.md
      - Updates:
          - updates/index.md
          - Updates installieren: updates/install.md
          - Versionsverlauf: updates/version-history.md
      - Deinstallation:
          - uninstallation/index.md
          - Über das Maintenance Tool: uninstallation/maintenance-tool.md
          - Über die Windows-Einstellungen: uninstallation/windows-settings.md
          - Daten entfernen: uninstallation/remove-data.md

  # ----- TAB: Bedienen -----------------------------------------------------
  - Bedienen:
      - Stammdaten:
          - master-data/index.md
          - Materialien: master-data/materials.md
          - Spulen: master-data/bobbins.md
          - Maschinen: master-data/machines.md
          - Kunden: master-data/customers.md
          - Farben: master-data/colors.md
      - Berechnungen:
          - calculations/index.md
          - Flechtgeometrie:
              - calculations/braid-geometry/index.md
              - Flechtwinkel: calculations/braid-geometry/braid-angle.md
              - Verlegelänge: calculations/braid-geometry/lay-length.md
              - Flechtdichte umrechnen: calculations/braid-geometry/picks-density.md
          - Material:
              - calculations/material/index.md
              - Lineare Dichte: calculations/material/linear-density.md
              - Lineare Dichte umrechnen: calculations/material/linear-density-conversion.md
              - Materialdurchmesser: calculations/material/material-diameter.md
              - Kern- und Mantelseile: calculations/material/core-sheath.md
          - Spulen:
              - calculations/bobbins/index.md
              - Spulenvolumen: calculations/bobbins/bobbin-volume.md
              - Materiallänge auf Spule: calculations/bobbins/material-length.md
              - Anzahl Spulenwickler: calculations/bobbins/number-of-winders.md
          - Maschine:
              - calculations/machine/index.md
              - Maschinenabmessungen: calculations/machine/dimensions.md
              - Flügelteilkreis: calculations/machine/wing-pitch-circle.md
              - Produktionsgeschwindigkeit: calculations/machine/production-speed.md
              - Laufzeit und Spulensatz: calculations/machine/run-time-bobbin-set.md
              - Wechselräder Gummiantrieb: calculations/machine/change-gears.md
          - Produkt:
              - calculations/product/index.md
              - Produktdurchmesser: calculations/product/product-diameter.md
              - Seillänge: calculations/product/rope-length.md
              - Seillänge auf Trommel: calculations/product/rope-length-on-drum.md
              - Seilgewicht: calculations/product/rope-weight.md
          - Rohrgeflecht:
              - calculations/tubular-braid/index.md
              - Rohr: calculations/tubular-braid/tube.md
              - Rohrträger: calculations/tubular-braid/tube-carriers.md
              - Rohrüberzug: calculations/tubular-braid/tube-cover.md
              - Rohrdurchmesser: calculations/tubular-braid/tube-diameter.md
              - Garnbreite: calculations/tubular-braid/yarn-width.md
          - Spezial:
              - calculations/advanced/index.md
              - Horn Gear Layout: calculations/advanced/horn-gear-layout.md
              - Horn Gear Übersicht: calculations/advanced/horn-gear-overview.md
              - Carriers Rules: calculations/advanced/carriers-rules.md
              - Flechtmuster (Braid Mapping): calculations/advanced/braid-mapping.md
      - Design:
          - design/index.md
          - Designer-Oberfläche: design/designer.md
          - Farben und Muster: design/colors.md
          - Produkt-Design: design/product.md
      - Aufträge:
          - orders/index.md
          - Auftrag anlegen: orders/create.md
          - Auftrag bearbeiten: orders/edit.md
          - QR-Code für die Maschine: orders/qr-code.md
          - Drucken: orders/print.md
      - Druckvorlagen:
          - print-templates/index.md
          - Vorlagen verwalten: print-templates/manage.md
          - Editor-Aufbau: print-templates/editor.md
          - Elemente (Text, Tabellen, Bilder): print-templates/elements.md
          - Vorschau und Druck: print-templates/preview-and-print.md

  # ----- TAB: Verwalten ----------------------------------------------------
  - Verwalten:
      - Benutzer und Rollen:
          - users/index.md
          - Login und Abmelden: users/login.md
          - Benutzer verwalten: users/manage.md
          - Rollen und Berechtigungen: users/roles.md
          - Eigenes Profil: users/my-profile.md
          - Profilbild ändern: users/avatar.md
          - Passwort zurücksetzen: users/password-reset.md
      - Workspace und Profile:
